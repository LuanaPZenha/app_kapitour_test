name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run all microservice tests
        run: python scripts/run_tests.py all

      - name: Run shared tests with coverage gate (70%)
        run: python scripts/run_tests.py shared --cov

  frontend-tests:
    name: Frontend (Jest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm test -- --ci --passWithNoTests

  docker-build:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build monolith image
        run: docker build -t kapitour-monolith:ci .

      - name: Build microservice images
        run: |
          for service in auth content commerce engagement kapipass; do
            docker build \
              -f backend/Dockerfile.service \
              --build-arg SERVICE="$service" \
              -t "kapitour-${service}:ci" \
              .
          done

      - name: Build worker image
        run: docker build -f backend/Dockerfile.worker -t kapitour-worker:ci .

  smoke-api:
    name: Smoke API (Docker Compose)
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start stack
        run: |
          mkdir -p database
          docker compose up -d redis auth content commerce engagement kapipass gateway

      - name: Run smoke tests
        run: python backend/scripts/smoke_api.py --base-url http://localhost:8080 --wait 120

      - name: Stop stack
        if: always()
        run: docker compose down -v
