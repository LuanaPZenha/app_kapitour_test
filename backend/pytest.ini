[pytest]
testpaths =
    services/auth/tests
    services/content/tests
    services/commerce/tests
    services/engagement/tests
    services/kapipass/tests
    shared/kapitour_shared/testes
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning

[coverage:run]
source = kapitour_shared
omit =
    */testes/*
    */__pycache__/*
    */middleware/*
    */core/app_factory.py
    */core/health.py
    */core/logging_config.py
    */core/__init__.py
    */banco_dados.py
    */database/*
    */clientes_http.py
    */contratos/*
    */fabricas.py
    */events/*
    */utilitarios.py

[coverage:report]
fail_under = 70
show_missing = true
